<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Toast Project</title>
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f8f9fa;
    }
  </style>
</head>
<body class="p-4">

  <h2>🔔 Bootstrap Toast Project</h2>

  <!-- Button to trigger toast -->
  <button type="button" class="btn btn-primary" id="showToastBtn">Show Toast</button>

  <!-- Toast -->
  <div class="toast" id="myToast" style="position: absolute; top: 20px; right: 20px;" data-delay="3000">
    <div class="toast-header">
      <strong class="mr-auto text-primary">Notification</strong>
      <small>Just now</small>
      <button type="button" class="ml-2 mb-1 close" data-dismiss="toast">&times;</button>
    </div>
    <div class="toast-body">
      Hello! This is a Bootstrap toast message.
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Show toast when button is clicked
    document.getElementById('showToastBtn').addEventListener('click', function () {
      $('#myToast').toast('show');
    });
  </script>
</body>
</html>
